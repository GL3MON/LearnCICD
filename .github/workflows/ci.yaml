name: Build Test
on: [push]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with: 
                node-version: 20
            
            - name: Install dependencies
              run: npm install
            
            - name: Run Server
              run: node server.js & sleep 5
            
            - name: Test Endpoint
              run: curl --fail http://localhost:3000/gps
            
            - name: Docker Build Test
              run: docker build -t gps-service-test .